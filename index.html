<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetChat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">💬</div>
      <h1>NetChat</h1>
      <p>Chat in real time</p>
    </div>

    <div class="auth-box">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('login')">Log In</button>
        <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="login-tab" class="tab-content">
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button class="btn-primary" onclick="login()">Log In</button>
      </div>

      <!-- Sign Up Form -->
      <div id="signup-tab" class="tab-content hidden">
        <input type="text" id="signup-name" placeholder="Your Name">
        <input type="email" id="signup-email" placeholder="Email">
        <input type="password" id="signup-password" placeholder="Password">
        <button class="btn-primary" onclick="signup()">Create Account</button>
      </div>

      <p id="auth-message"></p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
